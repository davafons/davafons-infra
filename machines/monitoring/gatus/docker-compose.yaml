services:
  gatus:
    image: ghcr.io/twin/gatus:stable
    container_name: gatus
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:8080"
      - "${TAILSCALE_IP}:3010:8080"
    volumes:
      - ./config:/config:ro
      - gatus_data:/data
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      options:
        max-size: 50m
        max-file: "3"

volumes:
  gatus_data:
