storage:
  type: sqlite
  path: /data/gatus.db
  number-of-results-to-keep: 132000

ui:
  title: "Nadeshiko Status"
  header: "Nadeshiko Status"
  logo: "https://nadeshiko.co/logo-38d6e06a.webp"
  link: "https://nadeshiko.co"
  dark-mode: true
  favicon:
    default: "https://nadeshiko.co/favicon.ico"
    size16x16: "https://nadeshiko.co/favicon.ico"
    size32x32: "https://nadeshiko.co/favicon.ico"

# Announcements are displayed at the top of the status page.
# Types: outage, operational, information, warning
# Add "archived: true" to move to the bottom of the page.
#
# announcements:
#   - timestamp: 2026-04-07T14:00:00Z
#     type: outage
#     message: "Scheduled maintenance from 14:00 to 16:00 UTC"
#   - timestamp: 2026-04-07T16:15:00Z
#     type: operational
#     message: "Maintenance completed. All systems operational."

alerting:
  discord:
    webhook-url: "${DISCORD_WEBHOOK_URL}"
    default-alert:
      failure-threshold: 3
      success-threshold: 2
      send-on-resolved: true

endpoints:
  # --- Nadeshiko (Web) ---
  - name: Homepage
    group: Nadeshiko (Web)
    url: "https://nadeshiko.co"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"
      - "[CERTIFICATE_EXPIRATION] > 72h"
    alerts:
      - type: discord

  - name: Search Page
    group: Nadeshiko (Web)
    url: "https://nadeshiko.co/search/hello"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"
    alerts:
      - type: discord

  # --- Nadeshiko (API) ---
  - name: API Health
    group: Nadeshiko (API)
    url: "https://api.nadeshiko.co/up"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"
      - "[CERTIFICATE_EXPIRATION] > 72h"
    alerts:
      - type: discord
