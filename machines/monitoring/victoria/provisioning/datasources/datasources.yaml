apiVersion: 1

datasources:
  - name: VictoriaMetrics
    uid: victoriametrics
    type: victoriametrics-metrics-datasource
    url: http://victoriametrics:8428
    access: proxy
    editable: true
    isDefault: true
    jsonData:
      timeInterval: "60s"

  - name: VictoriaMetrics (Prometheus)
    uid: victoriametrics-prom
    type: prometheus
    url: http://victoriametrics:8428
    access: proxy
    editable: true
    isDefault: false
    jsonData:
      timeInterval: "60s"

  - name: VictoriaLogs
    uid: victorialogs
    type: victoriametrics-logs-datasource
    url: http://victorialogs:9428/
    access: proxy
    editable: true
    isDefault: false

  - name: Nadeshiko PostgreSQL
    uid: nadeshiko-postgres
    type: postgres
    url: ${NADESHIKO_POSTGRES_HOST}:5432
    access: proxy
    editable: true
    isDefault: false
    jsonData:
      database: nadeshiko-prod
      user: grafana_reader
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 3600
      postgresVersion: 1700
      timescaledb: false
    secureJsonData:
      password: ${NADESHIKO_POSTGRES_PASSWORD}

  - name: Alertmanager
    uid: alertmanager
    type: alertmanager
    url: http://alertmanager:9093
    access: proxy
    editable: true
    isDefault: false
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false

  - name: VictoriaTraces
    uid: victoriatraces
    type: jaeger
    url: http://victoriatraces:10428/select/jaeger
    access: proxy
    editable: true
    isDefault: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs
        spanStartTimeShift: "-20m"
        spanEndTimeShift: "20m"
        filterByTraceID: true
        filterBySpanID: true
        customQuery: true
        query: trace_id:="${__trace.traceId}" AND span_id:="${__span.spanId}"
      tracesToMetrics:
        datasourceUid: victoriametrics-prom
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        queries:
          - name: Request rate
            query: sum(rate(traces_span_metrics_duration_milliseconds_count{service_name="${__span.tags.service.name}"}[$__rate_interval]))
          - name: Error rate
            query: sum(rate(traces_span_metrics_calls_milliseconds_total{service_name="${__span.tags.service.name}", status_code="STATUS_CODE_ERROR"}[$__rate_interval]))
