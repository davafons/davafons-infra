apiVersion: 1

datasources:
  - name: VictoriaMetrics
    uid: victoriametrics
    type: victoriametrics-metrics-datasource
    url: http://victoriametrics:8428
    access: proxy
    editable: true
    isDefault: true
    jsonData:
      timeInterval: "60s"

  - name: VictoriaMetrics (Prometheus)
    uid: victoriametrics-prom
    type: prometheus
    url: http://victoriametrics:8428
    access: proxy
    editable: true
    isDefault: false
    jsonData:
      timeInterval: "60s"

  - name: VictoriaLogs
    uid: victorialogs
    type: victoriametrics-logs-datasource
    url: http://victorialogs:9428/
    access: proxy
    editable: true
    isDefault: false

  - name: VictoriaTraces
    uid: victoriatraces
    type: jaeger
    url: http://victoriatraces:10428/select/jaeger
    access: proxy
    editable: true
    isDefault: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs
        spanStartTimeShift: "-20m"
        spanEndTimeShift: "20m"
        filterByTraceID: true
        filterBySpanID: true
        customQuery: true
        query: trace_id:="${__trace.traceId}" AND span_id:="${__span.spanId}"
