services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.139.0
    container_name: victoriametrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=3"
      - "--search.latencyOffset=5s"
      - "--opentelemetry.usePrometheusNaming=true"
      - "--enableMetadata=true"
    ports:
      - "127.0.0.1:8428:8428"
      - "${TAILSCALE_IP}:8428:8428"
    volumes:
      - vm_metrics_data:/storage
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  victorialogs:
    image: victoriametrics/victoria-logs:v1.43.1
    container_name: victorialogs
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:9428"
      - "--retentionPeriod=30d"
    ports:
      - "127.0.0.1:9428:9428"
      - "${TAILSCALE_IP}:9428:9428"
    volumes:
      - vm_logs_data:/storage
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.6.0
    container_name: victoriatraces
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:10428"
      - "--retentionPeriod=8w"
    volumes:
      - vm_traces_data:/storage
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.142.0
    container_name: otelcol
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "${TAILSCALE_IP}:4317:4317"
      - "127.0.0.1:4318:4318"
      - "${TAILSCALE_IP}:4318:4318"
    depends_on:
      - victoriametrics
      - victorialogs
      - victoriatraces
    environment:
      - GOMEMLIMIT=200MiB
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  vmalert:
    image: victoriametrics/vmalert:v1.139.0
    container_name: vmalert
    restart: unless-stopped
    command:
      - "--datasource.url=http://victoriametrics:8428/"
      - "--remoteRead.url=http://victoriametrics:8428/"
      - "--remoteWrite.url=http://victoriametrics:8428/"
      - "--notifier.url=http://alertmanager:9093/"
      - "--rule=/etc/alerts/*.yml"
    volumes:
      - ./config/vmalert-rules:/etc/alerts:ro
    depends_on:
      - victoriametrics
      - alertmanager
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command: ["--config.file=/config/alertmanager.yml"]
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./config/alertmanager.yml:/config/alertmanager.yml:ro
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  alertmanager-discord:
    image: rogerrum/alertmanager-discord:latest
    container_name: alertmanager-discord
    restart: unless-stopped
    environment:
      - DISCORD_WEBHOOK=${DISCORD_ALERT_WEBHOOK_URL}
      - DISCORD_USERNAME=Victoria Alerts
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      options:
        max-size: 50m
        max-file: "3"

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
      - "${TAILSCALE_IP}:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=victoriametrics-metrics-datasource,victoriametrics-logs-datasource
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=victoriametrics-metrics-datasource,victoriametrics-logs-datasource
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: 50m
        max-file: "3"

volumes:
  vm_metrics_data:
  vm_logs_data:
  vm_traces_data:
  grafana_data:
