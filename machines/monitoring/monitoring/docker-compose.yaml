services:
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
      - "${TAILSCALE_IP}:9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    image: grafana/loki:3.4.3
    container_name: loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yaml
    volumes:
      - ./config/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
      - "${TAILSCALE_IP}:3100:3100"
    deploy:
      resources:
        limits:
          memory: 512M

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "${TAILSCALE_IP}:4317:4317"
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "${TAILSCALE_IP}:4318:4318"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    volumes:
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
      - "${TAILSCALE_IP}:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GF_ROOT_URL}
    depends_on:
      - prometheus
      - loki
      - tempo
    deploy:
      resources:
        limits:
          memory: 256M

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3010:3001"
      - "${TAILSCALE_IP}:3010:3001"
    deploy:
      resources:
        limits:
          memory: 256M

  autokuma:
    image: ghcr.io/bigboot/autokuma:latest
    container_name: autokuma
    restart: unless-stopped
    environment:
      - AUTOKUMA__KUMA__URL=http://uptime-kuma:3001
      - AUTOKUMA__STATIC_MONITORS=/monitors
      - AUTOKUMA__DOCKER__ENABLED=false
      - AUTOKUMA__KUMA__USERNAME=${UPTIME_KUMA_USERNAME}
      - AUTOKUMA__KUMA__PASSWORD=${UPTIME_KUMA_PASSWORD}
      - AUTOKUMA__ENV__DISCORD_WEBHOOK_URL=${UPTIME_KUMA_DISCORD_WEBHOOK_URL}
    volumes:
      - ./config/uptime-kuma:/monitors:ro
    depends_on:
      - uptime-kuma

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_LISTEN_PORT=5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${TAILSCALE_IP}:5050:5050"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  uptime_kuma_data:
  pgadmin_data:
