services:
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=99
      - PGID=100
      - TZ=Asia/Tokyo
    volumes:
      - /mnt/user/appdata/calibre:/config
      - /mnt/user/Media/Books:/books
    ports:
      - 24080:8080
      - 24181:8181
      - 24081:8081
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/calibre.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8080]/"
    restart: unless-stopped

  komga:
    image: gotson/komga:latest
    container_name: komga
    environment:
      - PUID=99
      - PGID=100
      - TZ=Asia/Tokyo
    volumes:
      - /mnt/user/appdata/komga:/config
      - /mnt/user/Media/Comics/English:/manga-english
      - /mnt/user/Media/Comics/Japanese:/manga-japanese
    ports:
      - 25600:25600
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/komga.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:25600]/"
    restart: unless-stopped
