receivers:
  # --- Host metrics (replaces node_exporter) ---
  hostmetrics:
    collection_interval: 60s
    root_path: /
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      paging: {}
      processes: {}

  # --- Docker container metrics ---
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 60s
    api_version: "1.43"
    metrics:
      container.cpu.utilization:
        enabled: true
      container.memory.percent:
        enabled: true
      container.memory.usage.total:
        enabled: true
      container.memory.usage.limit:
        enabled: true
      container.network.io.usage.rx_bytes:
        enabled: true
      container.network.io.usage.tx_bytes:
        enabled: true
      container.blockio.io_service_bytes_recursive:
        enabled: true

  # --- Docker container logs ---
  file_log/docker:
    include: [/var/lib/docker/containers/*/*-json.log]
    start_at: end
    include_file_name: false
    include_file_path: true
    operators:
      - id: docker-json-parser
        type: json_parser
        parse_from: body
        parse_to: attributes._docker
      - type: move
        from: attributes._docker.log
        to: body
      - type: move
        if: attributes._docker.stream != nil
        from: attributes._docker.stream
        to: attributes["log.iostream"]
      - id: docker-time-parser
        type: time_parser
        parse_from: attributes._docker.time
        layout_type: gotime
        layout: '2006-01-02T15:04:05.999999999Z'
      # Extract container name from Docker log tag (if available)
      - type: move
        if: attributes._docker.attrs != nil and attributes._docker.attrs.tag != nil
        from: attributes._docker.attrs.tag
        to: resource["container.name"]
      - type: remove
        field: attributes._docker
      # Fallback: extract container name from file path when tag is missing
      # Path: /var/lib/docker/containers/<id>/<id>-json.log
      # We map container ID to name via docker_stats labels
      - type: add
        field: attributes.log.source
        value: docker
      # Set service.name from container name
      - type: copy
        if: resource["container.name"] != nil
        from: resource["container.name"]
        to: resource["service.name"]
      # All containers on qtower are infrastructure
      - type: add
        field: resource["deployment.environment"]
        value: infrastructure
      # Route logs by container type for format-specific parsing
      - type: router
        routes:
          - output: json-parser
            expr: 'body matches "^\\{"'
        default: severity-parser

      # === Structured JSON logs (Pino, Winston, etc.) ===
      - id: json-parser
        type: json_parser
        parse_from: body
        parse_to: attributes
        output: json-move-msg
      - id: json-move-msg
        type: move
        if: attributes.msg != nil
        from: attributes.msg
        to: body
        output: json-move-message
      - id: json-move-message
        type: move
        if: 'attributes.message != nil and body == nil'
        from: attributes.message
        to: body
        output: severity-parser

      # === Shared cleanup ===
      # Severity from structured JSON logs (level field)
      - id: severity-parser
        type: severity_parser
        if: attributes.level != nil
        parse_from: attributes.level
        overwrite_text: true
        mapping:
          trace: [trace, TRACE, "10"]
          debug: [debug, DEBUG, Debug, "20"]
          info: [info, INFO, Information, "30"]
          warn: [warn, WARN, WARNING, warning, Warning, "40"]
          error: [error, ERROR, Error, "50"]
          fatal: [fatal, FATAL, Fatal, "60"]
      - type: remove
        if: attributes.level != nil
        field: attributes.level
      # Severity from plain-text logs (e.g. "2026-04-12 12:04:50 INF ..." or "[ERROR] ...")
      - type: regex_parser
        if: 'attributes.level == nil and body != nil and body matches "(?i)(?:^|\\s|\\[)(?:DBG|TRC|INF|WRN|ERR|FTL|TRACE|DEBUG|INFO|WARN(?:ING)?|ERROR|FATAL|CRIT(?:ICAL)?)(?:\\s|\\]|:)"'
        parse_from: body
        regex: '(?i)(?:^|\s|\[)(?P<text_level>DBG|TRC|INF|WRN|ERR|FTL|TRACE|DEBUG|INFO|WARN(?:ING)?|ERROR|FATAL|CRIT(?:ICAL)?)(?:\s|\]|:)'
        parse_to: attributes._text_severity
        preserve_to: body
      - type: severity_parser
        if: attributes._text_severity != nil and attributes._text_severity.text_level != nil
        parse_from: attributes._text_severity.text_level
        overwrite_text: true
        mapping:
          trace: [TRC, trc, TRACE, trace]
          debug: [DBG, dbg, DEBUG, debug]
          info: [INF, inf, INFO, info]
          warn: [WRN, wrn, WARN, warn, WARNING, warning]
          error: [ERR, err, ERROR, error]
          fatal: [FTL, ftl, FATAL, fatal, CRIT, crit, CRITICAL, critical]
      - type: remove
        if: attributes._text_severity != nil
        field: attributes._text_severity
      - type: remove
        if: attributes.time != nil
        field: attributes.time
      - type: remove
        if: attributes.pid != nil
        field: attributes.pid
      - type: remove
        if: attributes.hostname != nil
        field: attributes.hostname
      - type: remove
        if: attributes.attrs != nil
        field: attributes.attrs


processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 384
    spike_limit_mib: 96
  batch:
    send_batch_size: 1000
    send_batch_max_size: 2048
    timeout: 10s
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    system:
      hostname_sources: [os]
      resource_attributes:
        host.name:
          enabled: true
        os.type:
          enabled: false
  # Override hostname to lowercase (Unraid uses "QTower")
  transform/hostname:
    error_mode: ignore
    log_statements:
      - context: resource
        statements:
          - set(attributes["host.name"], "qtower") where attributes["host.name"] == "QTower"
    metric_statements:
      - context: resource
        statements:
          - set(attributes["host.name"], "qtower") where attributes["host.name"] == "QTower"
  # Only keep homeassistant and syncthing container logs
  filter/keep_essential:
    error_mode: ignore
    logs:
      log_record:
        - 'not IsMatch(resource.attributes["container.name"], "^(homeassistant|syncthing|restic-backup|restic-rest-server)$")'

exporters:
  otlp_grpc:
    endpoint: ${env:OTEL_ENDPOINT}
    tls:
      insecure: true
    compression: gzip
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  telemetry:
    logs:
      encoding: json
  pipelines:
    metrics:
      receivers: [hostmetrics, docker_stats]
      processors: [memory_limiter, resourcedetection, transform/hostname, batch]
      exporters: [otlp_grpc]
    logs:
      receivers: [file_log/docker]
      processors: [memory_limiter, resourcedetection, transform/hostname, filter/keep_essential, batch]
      exporters: [otlp_grpc]
