services:
  otelcol-contrib:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: otelcol-contrib
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/cncf/artwork/main/projects/opentelemetry/icon/color/opentelemetry-icon-color.png"
    user: "0:0"
    deploy:
      resources:
        limits:
          memory: 512M
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log/host:ro
      - ./config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      - SIGNOZ_ENDPOINT=${SIGNOZ_ENDPOINT}
