services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: syncthing
    environment:
      - PUID=99
      - PGID=100
      - TZ=Asia/Tokyo
    volumes:
      - /mnt/user/appdata/syncthing:/config
      - /mnt/user/Documents:/data1
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/syncthing.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8384]/"
    restart: unless-stopped
