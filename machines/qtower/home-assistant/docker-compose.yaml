services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - /mnt/user/appdata/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    environment:
      - TZ=Asia/Tokyo
    network_mode: host
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/home-assistant.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8123]/"

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - eclipse_mosquitto
    devices:
      - /dev/serial/by-id/usb-Nabu_Casa_Home_Assistant_Connect_ZBT-1_7e7b5a8e01d7ed119b2c776162c613ac-if00-port0:/dev/ttyUSB0
    volumes:
      - /mnt/user/appdata/zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - 55403:8080
    environment:
      - TZ=Asia/Tokyo
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/zigbee2mqtt.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8080]/"

  matter-server:
    container_name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    restart: unless-stopped
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - /mnt/user/appdata/matter-server:/data
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=Asia/Tokyo
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/home-assistant.png"

  eclipse_mosquitto:
    container_name: eclipse_mosquitto
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/mosquitto/config:/mosquitto/config
      - /mnt/user/appdata/mosquitto/data:/mosquitto/data
      - /mnt/user/appdata/mosquitto/log:/mosquitto/log
    network_mode: host
    environment:
      - TZ=Asia/Tokyo
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/mosquitto.png"
