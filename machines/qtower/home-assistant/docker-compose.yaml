services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - /mnt/user/appdata/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tokyo
    network_mode: host
    devices:
      # Make sure this matches your adapter location
      - /dev/ttyUSB0:/dev/ttyUSB0

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - eclipse_mosquitto
    privileged: true
    volumes:
      - /mnt/user/appdata/zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    ports:
      # Frontend port
      - 55403:8080
    environment:
      - TZ=Asia/Tokyo
    devices:
      # Make sure this matches your adapter location
      - /dev/ttyUSB0:/dev/ttyUSB0

  eclipse_mosquitto:
    container_name: eclipse_mosquitto
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/mosquitto/config:/mosquitto/config
      - /mnt/user/appdata/mosquitto/data:/mosquitto/data
      - /mnt/user/appdata/mosquitto/log:/mosquitto/log
    network_mode: host
    environment:
      - TZ=Asia/Tokyo
