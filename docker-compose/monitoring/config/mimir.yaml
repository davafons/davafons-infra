# Single-binary mode (all components in one process)
target: all

multitenancy_enabled: false

# Blocks storage (local filesystem)
blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
    retention_period: 30d

compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist
  compaction_interval: 30m

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist
    replication_factor: 1

# Accept samples up to 5 minutes old (handles clock skew)
limits:
  ingestion_rate: 10000
  max_global_series_per_user: 150000
  compactor_blocks_retention_period: 30d

server:
  log_level: warn

usage_stats:
  enabled: false
