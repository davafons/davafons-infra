networks:
  infisical:

services:
  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    pull_policy: always
    networks:
      - infisical
    ports:
      - ${INFISICAL_PORT:-8080}:8080
    depends_on:
      infisical_db:
        condition: service_healthy
      infisical_redis:
        condition: service_started
    environment:
      NODE_ENV: production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      DB_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@infisical_db:5432/${POSTGRES_DB:-infisical}
      REDIS_URL: redis://infisical_redis:6379
      SITE_URL: ${SITE_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Infisical}

  infisical_redis:
    image: redis:7-alpine
    container_name: infisical_redis
    restart: always
    networks:
      - infisical
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - infisical_redis_data:/data

  infisical_db:
    image: postgres:16-alpine
    container_name: infisical_db
    restart: always
    networks:
      - infisical
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-infisical}
    healthcheck:
      test: "pg_isready --username=${POSTGRES_USER} && psql --username=${POSTGRES_USER} --list"
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  infisical_db_data:
  infisical_redis_data:
