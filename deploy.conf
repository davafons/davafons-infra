# Deploy configuration
# Maps servers to their stacks and settings
#
# Format:
#   [server-name]
#   host = <ssh-host>        # matches ~/.ssh/config Host entry
#   dir = <remote-base-dir>  # where stacks are deployed on the server
#   stacks = <stack1> <stack2> ...

[qtower]
host = qtower
dir = /home/docker
stacks = books cloudflare dawarich home-assistant monitoring photos rr-stack system

[inari]
host = inari
dir = /home/docker
stacks = db

[monitoring]
host = monitoring
dir = /home/docker
stacks = cloudflared gatus monitoring signoz
