# Deploy configuration
# Maps servers to their stacks and settings
#
# Format:
#   SERVER <name> <ssh-host> <remote-base-dir>
#   STACK <server-name> <stack-name>
#
# ssh-host: matches your ~/.ssh/config Host entry (typically Tailscale hostname)
# remote-base-dir: where stacks are deployed on the server

SERVER wariwari-prod wariwari-prod /home/docker
STACK wariwari-prod agent
STACK wariwari-prod books
STACK wariwari-prod cloudflare
STACK wariwari-prod dawarich
STACK wariwari-prod db
STACK wariwari-prod home-assistant
STACK wariwari-prod infisical
STACK wariwari-prod misc
STACK wariwari-prod photos
STACK wariwari-prod rr-stack
STACK wariwari-prod system

SERVER monitoring monitoring /home/docker
STACK monitoring monitoring
