# Deploy configuration
# Maps servers to their stacks and settings
#
# Format:
#   [server-name]
#   host = <ssh-host>        # matches ~/.ssh/config Host entry
#   dir = <remote-base-dir>  # where stacks are deployed on the server
#   stacks = <stack1> <stack2> ...

[qtower]
host = qtower
dir = /home/docker
stacks = agent books cloudflare dawarich db home-assistant infisical misc photos rr-stack system

[monitoring]
host = monitoring
dir = /home/docker
stacks = monitoring
